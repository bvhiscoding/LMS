<!doctype html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Thêm mới câu hỏi | E-Learning VBS</title><link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="../../css/main.css"><link rel="stylesheet" href="../../css/gv/ngan-hang-de-thi.css"></head><body data-role="gv" data-page="gv-question-form"><main class="main question-form-page"><section class="screen active"><nav class="exam-bank-tabs compact"><a href="ngan-hang-de-thi.html?tab=questions"><i class="fa-regular fa-circle-question"></i>Câu hỏi</a><a href="ngan-hang-de-thi.html?tab=exams"><i class="fa-regular fa-file-lines"></i>Đề thi</a></nav><header class="question-form-head"><h1><i class="fa-regular fa-square-plus"></i><span id="questionFormTitle">Thêm mới câu hỏi</span></h1><a class="btn ghost" href="ngan-hang-de-thi.html?tab=questions"><i class="fa-solid fa-arrow-left"></i>Quay lại danh sách</a></header><form id="questionForm" class="question-builder"><section><div class="builder-block"><h2><b>1</b>Thông tin chung</h2><div class="builder-grid"><label><span>Loại câu hỏi *</span><select name="type" id="questionType"><option>Một lựa chọn</option><option>Nhiều lựa chọn</option><option>Đúng / Sai</option><option>Tự luận</option></select></label><label><span>Chuyên đề *</span><select name="category"><option>An toàn lao động</option><option>Phòng cháy chữa cháy</option></select></label><label><span>Chủ đề *</span><select name="topic"><option>Thông gió hầm lò</option><option>An toàn cá nhân</option></select></label><label><span>Mức độ *</span><select name="level"><option>Trung bình</option><option>Dễ</option><option>Khó</option></select></label><label><span>Điểm *</span><input name="score" type="number" min="0.5" step="0.5" value="1" required></label><label><span>Cách chấm *</span><select name="grading"><option>Tự động</option><option>Thủ công</option></select></label><label class="full"><span>Tags</span><input name="tags" placeholder="Chọn hoặc nhập tag..."></label></div></div><div class="builder-block"><h2><b>2</b>Nội dung câu hỏi</h2><label><span>Nội dung câu hỏi *</span><div class="rich-editor"><div><b>B</b><i>I</i><u>U</u><span>☷</span><span>≡</span><span>x²</span><i class="fa-solid fa-link"></i><i class="fa-regular fa-image"></i></div><textarea name="content" required>Lưu lượng gió tối thiểu cho gương lò được xác định dựa trên?</textarea></div></label><label class="upload-box"><i class="fa-solid fa-cloud-arrow-up"></i><b>Kéo thả file vào đây hoặc chọn file</b><small>Định dạng JPG, PNG, GIF (tối đa 5MB)</small><input type="file" accept="image/*"></label></div></section><section><div class="builder-block"><h2><b>3</b>Đáp án</h2><p class="muted">Chọn đáp án đúng nhất.</p><div id="answerList"></div><button type="button" class="btn dashed" id="addAnswer"><i class="fa-solid fa-plus"></i>Thêm phương án</button></div><div class="builder-block"><h2><b>4</b>Giải thích đáp án</h2><textarea name="explanation" rows="4">Lưu lượng gió tối thiểu phải đảm bảo nồng độ khí độc trong không khí làm việc luôn nhỏ hơn giới hạn cho phép.</textarea></div><div class="builder-block"><h2><b>5</b>Trạng thái</h2><label class="switch-label"><input name="active" type="checkbox" checked><span></span><b>Sử dụng</b></label><p class="muted">Câu hỏi sẽ được sử dụng trong ngân hàng câu hỏi</p></div></section><footer><button type="button" class="btn ghost" id="cancelQuestion">Hủy</button><button type="button" class="btn ghost" id="saveDraft"><i class="fa-regular fa-floppy-disk"></i>Lưu nháp</button><button type="button" class="btn ghost" id="saveAndNext"><i class="fa-solid fa-box"></i>Lưu và thêm câu tiếp theo</button><button class="btn primary">Lưu câu hỏi</button></footer></form><div class="bank-toast" id="bankToast" hidden></div></section></main><script src="../../js/gv-shell.js"></script><script src="../../js/app.js"></script><script src="../../js/them-cau-hoi.js"></script></body></html>
