<!doctype html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Ngân hàng câu hỏi & đề thi | E-Learning VBS</title><link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="../../css/main.css"><link rel="stylesheet" href="../../css/gv/ngan-hang-de-thi.css"></head><body data-role="gv" data-page="gv-exam">
<main class="main exam-bank-page"><section class="screen active"><header class="exam-bank-head"><div><h1>Ngân hàng câu hỏi & đề thi</h1><div class="crumb">Trang chủ <i class="fa-solid fa-chevron-right"></i> Ngân hàng đề thi</div></div></header><nav class="exam-bank-tabs"><button class="active" data-bank-tab="questions"><i class="fa-regular fa-circle-question"></i>Câu hỏi</button><button data-bank-tab="exams"><i class="fa-regular fa-file-lines"></i>Đề thi</button></nav><section id="bankView"></section><div class="bank-toast" id="bankToast" hidden></div></section></main>
<dialog class="bank-dialog" id="importDialog"><form id="importForm"><header><div><h2>Nhập dữ liệu từ Excel</h2><p>Chọn tệp mẫu để bổ sung dữ liệu demo</p></div><button type="button" data-close-dialog><i class="fa-solid fa-xmark"></i></button></header><div class="bank-dialog-body"><label class="file-drop"><i class="fa-solid fa-cloud-arrow-up"></i><b>Chọn hoặc kéo thả tệp Excel</b><small>Định dạng .xlsx, tối đa 10MB</small><input type="file" accept=".xlsx" required></label><a class="sample-link"><i class="fa-solid fa-download"></i>Tải tệp mẫu</a></div><footer><button type="button" class="btn ghost" data-close-dialog>Hủy</button><button class="btn primary"><i class="fa-solid fa-file-import"></i>Nhập dữ liệu</button></footer></form></dialog>
<dialog class="bank-dialog" id="autoExamDialog"><form id="autoExamForm"><header><div><h2>Tạo đề thi tự động</h2><p>Hệ thống chọn câu hỏi theo cấu hình</p></div><button type="button" data-close-dialog><i class="fa-solid fa-xmark"></i></button></header><div class="bank-dialog-body form-grid"><label><span>Tên đề thi *</span><input name="name" required></label><label><span>Chuyên đề</span><select name="topic"><option>An toàn lao động</option><option>Phòng cháy chữa cháy</option><option>Sơ cứu y tế</option></select></label><label><span>Số câu *</span><input name="count" type="number" min="5" value="40" required></label><label><span>Thời gian (phút)</span><input name="duration" type="number" min="10" value="60"></label></div><footer><button type="button" class="btn ghost" data-close-dialog>Hủy</button><button class="btn primary"><i class="fa-solid fa-wand-magic-sparkles"></i>Tạo đề</button></footer></form></dialog>
<script src="../../js/gv-shell.js"></script><script src="../../js/app.js"></script><script src="../../js/ngan-hang-de-thi.js"></script></body></html>
