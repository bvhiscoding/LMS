<!doctype html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Thêm khóa học mới | E-Learning VBS</title><link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="../../css/main.css"><link rel="stylesheet" href="../../css/gv/quan-ly-khoa-hoc.css"></head><body data-role="gv" data-page="gv-course-create"><main class="main course-form-page"><section class="screen active"><header class="course-form-head"><div><div class="crumb">Nghiệp vụ <i class="fa-solid fa-chevron-right"></i> Quản lý khóa học <i class="fa-solid fa-chevron-right"></i> Thêm khóa học</div><h1 id="courseFormTitle">Thêm khóa học mới</h1></div><div><a class="btn ghost" href="quan-ly-khoa-hoc.html"><i class="fa-regular fa-circle-xmark"></i>Hủy</a><button class="btn primary" form="courseForm"><i class="fa-regular fa-floppy-disk"></i>Lưu khóa học</button></div></header><form id="courseForm"><section class="course-form-card"><h2>Thông tin chung</h2><div class="course-form-grid"><label><span>Mã khóa học *</span><input name="code" value="KH-ATLD-01" required></label><label><span>Tên khóa học *</span><input name="name" value="An toàn lao động trong khai thác mỏ" required></label><label><span>Hình thức *</span><select name="format"><option>Blended</option><option>Trực tuyến</option><option>Trực tiếp</option></select></label><label><span>Đơn vị tổ chức *</span><select name="unit"><option>Phòng Đào tạo</option><option>Trung tâm Đào tạo</option></select></label><label><span>Thời lượng dự kiến *</span><input name="duration" value="24 giờ / 12 buổi" required></label><label><span>Đối tượng học *</span><input name="audience" value="CBNV khối khai thác mỏ" required></label><label class="full"><span>Mô tả khóa học</span><textarea name="description" maxlength="500" rows="4">Khóa học cung cấp kiến thức và kỹ năng về an toàn lao động trong khai thác mỏ, giúp học viên nhận diện rủi ro, tuân thủ quy định và xử lý tình huống an toàn hiệu quả.</textarea><small><output id="courseDescriptionCount">0</output>/500</small></label></div></section><section class="course-form-card"><h2>Điều kiện tiên quyết</h2><div class="chip-input"><label><span>Yêu cầu hoàn thành khóa học tiên quyết</span><input id="prerequisiteInput" placeholder="Tìm kiếm khóa học tiên quyết, nhấn Enter để thêm"></label><div id="prerequisiteChips"></div></div><div class="chip-input"><label><span>Yêu cầu năng lực đầu vào</span><input id="competencyInput" placeholder="Tìm kiếm năng lực đầu vào, nhấn Enter để thêm"></label><div id="competencyChips"></div></div></section><p class="form-note"><i class="fa-solid fa-circle-info"></i>Các trường có dấu <b>*</b> là bắt buộc nhập</p></form><div class="course-toast" id="courseToast" hidden></div></section></main><script src="../../js/gv-shell.js"></script><script src="../../js/app.js"></script><script src="../../js/them-khoa-hoc.js"></script></body></html>
