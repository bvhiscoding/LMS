<!doctype html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Chức danh & khung năng lực | E-Learning VBS</title><link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="../../css/main.css"><link rel="stylesheet" href="../../css/gv/khung-nang-luc.css"></head><body data-role="gv" data-page="gv-competency"><main class="main competency-page"><section class="screen active"><header class="competency-head"><div><div class="crumb">Chương trình <i class="fa-solid fa-chevron-right"></i> Quản lý lộ trình đào tạo</div><h1>Chức danh & khung năng lực</h1><p>Xây dựng chức danh, chuẩn năng lực và lộ trình học tập tương ứng</p></div><button class="btn primary" id="mainAdd"><i class="fa-solid fa-plus"></i> Thêm chức danh</button></header><nav class="competency-tabs" id="competencyTabs"><button class="active" data-tab="positions">Quản lý chức danh</button><button data-tab="frameworks">Khung năng lực</button><button data-tab="paths">Lộ trình theo chức danh</button></nav><form class="competency-filter" id="competencyFilter"><label><input name="q" placeholder="Tìm theo tên, mã, mô tả..."><i class="fa-solid fa-magnifying-glass"></i></label><select name="unit"><option value="">Tất cả đơn vị</option><option>Phòng Kinh doanh</option><option>Phòng Nhân sự</option><option>Trung tâm CNTT</option></select><select name="status"><option value="">Tất cả trạng thái</option><option>Đang hoạt động</option><option>Tạm dừng</option></select><button type="reset" class="btn ghost">Xóa bộ lọc</button></form><div id="competencyPanel"></div><dialog class="competency-dialog" id="positionDialog"><header><div><h2>Thêm chức danh</h2><p>Tạo mới chức danh để xây dựng lộ trình đào tạo</p></div><button data-close><i class="fa-solid fa-xmark"></i></button></header><form id="positionForm"><label>Tên chức danh *<input required placeholder="Nhập tên chức danh
